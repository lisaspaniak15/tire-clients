<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Portal — Truth in Real Estate</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .logo { font-size: 0.85rem; letter-spacing: 0.2em; text-transform: uppercase; color: #a0a0b0; margin-bottom: 2rem; }
    .tag {
      display: inline-block;
      background: #1a1f2e;
      border: 1px solid #2a3050;
      color: #c9a84c;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.4rem 1rem;
      border-radius: 100px;
      margin-bottom: 1.5rem;
    }
    h1 { font-size: 2.5rem; font-weight: 700; line-height: 1.2; margin-bottom: 1.5rem; }
    p { font-size: 1.05rem; color: #a0a0b0; max-width: 440px; line-height: 1.7; margin-bottom: 3rem; }
    .coming-soon {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #444;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .back { margin-top: 3rem; }
    .back a { color: #a0a0b0; font-size: 0.85rem; text-decoration: none; }
    .back a:hover { color: #fff; }
  </style>
</head>
<body>
  <div class="logo">Truth in Real Estate</div>
  <div class="tag">Seller &amp; Buyer Portal</div>
  <h1>Find an agent you can actually trust.</h1>
  <p>This is where sellers and buyers will log in to view their matched agent, track their referral, and access their concierge support.</p>
  <div class="coming-soon">Seller &amp; buyer login portal — coming soon</div>
  <div class="back"><a href="https://tire-main.fly.dev">&larr; Back to main site</a></div>
</body>
</html>
